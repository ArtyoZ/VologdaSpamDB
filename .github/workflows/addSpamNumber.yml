name: Add spam phone number

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'The spam phone number to add'
        required: true
        type: string

jobs:
  add-number:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process, append and sort
        run: |
          # Убираем случайные пробелы по краям
          PHONE=$(echo "${{ inputs.phone_number }}" | xargs)

          # Если пользователь ввел номер без плюса, автоматически добавляем его
          #if [[ "$PHONE" != +* ]]; then
          #  PHONE="+$PHONE"
          #fi

          # Удаляем Windows-окончания строк (\r), чтобы grep работал корректно
          sed -i 's/\r$//' VologdaSpamDB.csv

          # Проверяем точное совпадение строки
          if grep -qxF "$PHONE" VologdaSpamDB.csv; then
            echo "Number '$PHONE' already exists in the database. Skipping."
          else
            echo "Adding '$PHONE' to the database..."
            echo "$PHONE" >> VologdaSpamDB.csv

            # Сохраняем заголовок 'pattern', а всё остальное сортируем. 
            # Флаг -u (unique) дополнительно удалит любые старые дубликаты из файла.
            (head -n 1 VologdaSpamDB.csv && tail -n +2 VologdaSpamDB.csv | sort -u) > tmp.csv
            mv tmp.csv VologdaSpamDB.csv
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VologdaSpamDB.csv
          
          # Если изменений нет (номер уже был), commit не выполнится, пайплайн не упадет благодаря || echo
          git commit -m "Add number: ${{ inputs.phone_number }}" || echo "No changes to commit"
          git push
