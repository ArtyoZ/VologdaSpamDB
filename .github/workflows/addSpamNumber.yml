name: Add spam number

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'The spam phone number to append'
        required: true
        type: string

jobs:
  add-number:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append number to CSV if not exists and sort
        run: |
          # Нормализуем файл: удаляем \r (CR) в конце строк (Windows → Unix)
    sed -i 's/\r$//' VologdaSpamDB.csv

    # Очищаем ввод от пробельных символов
    NUMBER=$(echo "${{ inputs.phone_number }}" | xargs)
    echo "Checking for number: [$NUMBER]"

    if grep -qxF "$NUMBER" VologdaSpamDB.csv; then
      echo "Number already exists, skipping."
    else
      echo "$NUMBER" >> VologdaSpamDB.csv
      echo "Number added."

      # Сортировка с сохранением заголовка
      head -n 1 VologdaSpamDB.csv > tmp.csv
      tail -n +2 VologdaSpamDB.csv | sort -V >> tmp.csv
      mv tmp.csv VologdaSpamDB.csv
      echo "File sorted."
    fi
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "my@bot.com"
          git add VologdaSpamDB.csv
          git commit -m "Add spam phone number: ${{ inputs.phone_number }}" || echo "No changes to commit"
          git push
