name: Add spam number

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'The spam phone number to append'
        required: true
        type: string

jobs:
  add-number:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append number to CSV if not exists and sort
        run: |
          if grep -qxF "${{ inputs.phone_number }}" VologdaSpamDB.csv; then
            echo "Number already exists, skipping."
          else
            # Добавляем новый номер в конец файла
            echo "${{ inputs.phone_number }}" >> VologdaSpamDB.csv

            # Сохраняем заголовок (первую строку) во временный файл
            head -n 1 VologdaSpamDB.csv > tmp.csv

            # Берём все строки кроме заголовка, сортируем их и дописываем
            tail -n +2 VologdaSpamDB.csv | sort -V >> tmp.csv

            # Заменяем исходный файл отсортированным
            mv tmp.csv VologdaSpamDB.csv
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "my@bot.com"
          git add VologdaSpamDB.csv
          git commit -m "Add spam phone number: ${{ inputs.phone_number }}" || echo "No changes to commit"
          git push
